<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Architect's Studio | Hidden Asset Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Tajawal:wght@500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
      :root {
        --bg-color: #030014;
        --border: rgba(0, 229, 255, 0.2);
        --primary: #00e5ff;
        --text: #e2e8f0;
      }
      body {
        background-color: var(--bg-color);
        color: var(--text);
        font-family: 'Inter', sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
      }
      .studio-container {
        background: rgba(10, 10, 20, 0.8);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 40px;
        width: 100%;
        max-width: 600px;
        box-shadow: 0 0 40px rgba(0, 229, 255, 0.1);
        backdrop-filter: blur(10px);
      }
      h1 { text-align: center; color: var(--primary); margin-bottom: 5px;}
      .form-group { margin-bottom: 20px; }
      label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9rem; color: #aaa;}
      input[type="text"], input[type="file"] {
        width: 100%;
        padding: 12px;
        background: rgba(0,0,0,0.5);
        border: 1px solid var(--border);
        color: white;
        border-radius: 8px;
        box-sizing: border-box;
      }
      .upload-btn {
        width: 100%;
        padding: 15px;
        background: var(--primary);
        color: black;
        border: none;
        border-radius: 8px;
        font-weight: bold;
        cursor: pointer;
        font-size: 16px;
        transition: 0.3s;
      }
      .upload-btn:hover { box-shadow: 0 0 20px var(--primary); }
      .result-box { margin-top: 20px; display: none; }
      textarea {
        width: 100%;
        height: 200px;
        background: black;
        color: #0f0;
        font-family: monospace;
        border: 1px solid var(--border);
        padding: 15px;
        box-sizing: border-box;
        border-radius: 8px;
      }
      .loading { text-align: center; display: none; margin-top: 15px; color: var(--primary); font-weight: bold;}
    </style>
  </head>
  <body>
    <div class="studio-container">
      <h1><i class="fas fa-terminal"></i> Architect's Studio</h1>
      <p style="text-align:center; color: #888; margin-bottom: 30px;">Generate Gallery HTML snippet and upload to ImgBB.</p>
      
      <div class="form-group">
        <label>Image File:</label>
        <input type="file" id="imageInput" accept="image/*" />
      </div>
      
      <div class="form-group">
        <label>Caption (English):</label>
        <input type="text" id="captionEn" placeholder="e.g. AI Workflow Optimization" />
      </div>
      
      <div class="form-group">
        <label>Caption (Arabic):</label>
        <input type="text" id="captionAr" placeholder="e.g. تحسين مسارات العمل" style="font-family: 'Tajawal', sans-serif;" />
      </div>

      <button class="upload-btn" onclick="uploadImage()"><i class="fas fa-upload"></i> Upload & Generate Code</button>
      
      <div class="loading" id="loading"><i class="fas fa-spinner fa-spin"></i> Uploading to Operational Infrastructure...</div>
      
      <div class="result-box" id="resultBox">
        <label>Copy this snippet and paste it into index.html (Gallery Section):</label>
        <textarea id="htmlCode" readonly></textarea>
        <button class="upload-btn" style="margin-top: 10px; background: #222; color: white; border: 1px solid var(--border);" onclick="copyCode()">
          <i class="fas fa-copy"></i> Copy Code
        </button>
      </div>
    </div>

    <script>
      const IMGBB_API_KEY = "2e43f27ca045268329b8b9979cce69b7";

      async function uploadImage() {
        const fileInput = document.getElementById('imageInput');
        const captionEn = document.getElementById('captionEn').value || "Gallery Item";
        const captionAr = document.getElementById('captionAr').value || "عنصر معرض";
        
        if (!fileInput.files[0]) {
          alert('Please select an image first.');
          return;
        }

        const formData = new FormData();
        formData.append("image", fileInput.files[0]);

        document.getElementById('loading').style.display = 'block';
        document.getElementById('resultBox').style.display = 'none';

        try {
          const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
            method: "POST",
            body: formData
          });
          const data = await response.json();
          
          if(data.success) {
            const imgUrl = data.data.url;
            const htmlSnippet = `          <a href="${imgUrl}" class="gallery-item" data-aos="fade-up">
            <div class="gallery-image">
              <img src="${imgUrl}" alt="${captionEn}" loading="lazy" />
              <div class="gallery-overlay">
                <i class="fas fa-search-plus"></i>
              </div>
            </div>
            <div class="gallery-caption">
              <span class="lang-en">${captionEn}</span>
              <span class="lang-ar">${captionAr}</span>
            </div>
          </a>`;
            
            document.getElementById('htmlCode').value = htmlSnippet;
            document.getElementById('resultBox').style.display = 'block';
          } else {
            alert('Upload failed: ' + data.error.message);
          }
        } catch (err) {
          alert('Error: ' + err.message);
        } finally {
          document.getElementById('loading').style.display = 'none';
        }
      }

      function copyCode() {
        const copyText = document.getElementById("htmlCode");
        copyText.select();
        document.execCommand("copy");
        alert("Copied to clipboard!");
      }
    </script>
  </body>
</html>
